services:
  - type: web
    name: avoclassifier-api
    runtime: python
    pythonVersion: "3.11"
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn core.wsgi:application --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: avoclassifier-db
          property: connectionString
      - key: MEDIA_ROOT
        value: /opt/render/project/src/media
      - key: AI_MODEL_DIR
        value: /opt/render/project/src/models
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: HF_MODEL_REPO
        value: "cmep121/avoclassifier"
      - key: HF_TOKEN
        sync: false
    disk:
      name: avoclassifier-data
      mountPath: /opt/render/project/src/media
      sizeGB: 1

databases:
  - name: avoclassifier-db
    plan: free
    databaseName: avoclassifier
    user: avoclassifier
