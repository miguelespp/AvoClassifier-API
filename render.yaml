services:
  # ── Web API ────────────────────────────────────────────────────────────────
  - type: web
    name: avoclassifier-api
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn core.wsgi:application --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: avoclassifier-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: avoclassifier-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: avoclassifier-redis
          type: redis
          property: connectionString
      - key: MEDIA_ROOT
        value: /opt/render/project/src/media
      - key: AI_MODEL_DIR
        value: /opt/render/project/src/models
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: HF_MODEL_REPO
        value: "cmep121/avoclassifier"
      - key: HF_SPACE_URL
        value: "cmep121/avoclassifier-space"
      - key: HF_TOKEN
        sync: false
    disk:
      name: avoclassifier-data
      mountPath: /opt/render/project/src/media
      sizeGB: 1

  # ── Celery Worker ──────────────────────────────────────────────────────────
  # Procesa las tareas de clasificación en segundo plano.
  # Requiere USE_GCS=true para acceder a las imágenes subidas (el disco del
  # servicio web no es compartido con el worker).
  - type: worker
    name: avoclassifier-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A core worker --loglevel=info --concurrency=2
    envVars:
      - key: SECRET_KEY
        fromService:
          name: avoclassifier-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: avoclassifier-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: avoclassifier-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: avoclassifier-redis
          type: redis
          property: connectionString
      - key: HF_SPACE_URL
        value: "cmep121/avoclassifier-space"
      - key: HF_TOKEN
        sync: false
      - key: USE_GCS
        sync: false
      - key: GS_BUCKET_NAME
        sync: false
      - key: GS_CREDENTIALS_JSON
        sync: false

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: avoclassifier-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: avoclassifier-db
    plan: free
    databaseName: avoclassifier
    user: avoclassifier
